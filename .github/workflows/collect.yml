name: Daily AI News Collection

on:
  schedule:
    - cron: '20 20 * * *'  # UTC 20:20 = JST 5:20 (GHA キュー遅延を見込んで JST 7:00 前完了を担保。完了時は Discord 通知)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: collector
        run: uv sync

      - name: Collect and generate news
        working-directory: collector
        env:
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CI: "true"
        run: uv run python -m src.main

      - name: Commit articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --cached --quiet || git commit -m "Add AI news $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push

      - name: Upload MP3 to Release
        if: hashFiles('articles/*.mp3') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          MP3="articles/${DATE}.mp3"
          if [ -f "$MP3" ]; then
            gh release create "news-${DATE}" \
              --title "AI News ${DATE}" \
              --notes "AI・テクノロジーニュース ${DATE}" || true
            gh release upload "news-${DATE}" "$MP3" --clobber
          fi

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 通知本文のリンク先。独自ドメインがあれば書き換える
          SITE_URL: "https://ainews-eight-theta.vercel.app"
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL 未設定のため通知をスキップ"
            exit 0
          fi
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          # 本日分の記事数を index.json から取得（取れなければ md の見出し数で代用）
          COUNT=$(jq -r --arg d "$DATE" '.articles[] | select(.date==$d) | .article_count' articles/index.json 2>/dev/null | head -1)
          [ -z "$COUNT" ] && COUNT=$(grep -c '^### ' "articles/${DATE}.md" 2>/dev/null || echo "?")
          # 本日のトップ見出しを1行だけ抜粋
          TOP=$(grep -m1 '^### ' "articles/${DATE}.md" 2>/dev/null | sed 's/^### //')
          CONTENT=$(printf '📰 本日のAIニュース %s（%s件）が揃いました！\n%s\n%s' \
            "$DATE" "$COUNT" "${TOP:+▸ $TOP}" "$SITE_URL")
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
          curl -fsS -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" \
            && echo "Discord 通知を送信しました" || echo "Discord 通知の送信に失敗（処理は継続）"
